<!DOCTYPE html>
<html>
<head>
<title>Sitka Visit</title>
	<link rel='stylesheet' href='style.css'/>
	<script src="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.js"></script>
<link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.css" />
</head>
<body>
<script src='castleHill.js'></script>
<script src='food.js'></script>
<script src='playgrounds.js'></script>
<script src='points.js'></script>
<script src='stores.js'></script>
<script src='walks.js'></script>
<div id="map"></div>
<script>
		
		var mbUrl = 'https://{s}.tiles.mapbox.com/v3/{id}/{z}/{x}/{y}.png';

	    var grayscale   = L.tileLayer(mbUrl, {id: 'examples.map-20v6611k'}),
		    streets  = L.tileLayer(mbUrl, {id: 'examples.map-i86knfo3'});

		var map = L.map('map', {
			center: [57.05, -135.33],
			zoom: 14,
			layers: [streets, walks]
		});
		
		map.locate({setView: true, maxZoom: 16});
			
			function onLocationFound(e) {
  				  var radius = e.accuracy / 2;

		    L.marker(e.latlng).addTo(map)
        		.bindPopup("You are somewhere around here").openPopup();

		    L.circle(e.latlng, radius).addTo(map);
			}

		map.on('locationfound', onLocationFound);
			
		var baseLayers = {
			"Grayscale": grayscale,
			"Streets": streets
		};

		var overlays = {
			"Playgrounds": playgrounds,
			"Food spots": food,
			"POIs": points,
			"Grocery stores": stores,
			"Nice walks": walks			
		};

		L.control.layers(baseLayers, overlays).addTo(map);
		
		var sitkaIcon = L.Icon.extend({
			options: {
				shadowUrl: 'shadow.png',
				iconSize:     [44, 44],
   				shadowSize:   [30, 30],
    			iconAnchor:   [21, 45],
    			shadowAnchor: [4, 30],
    			popupAnchor:  [2, -42]
    		}
    	});
    	
    	var cafeIcon = new sitkaIcon({iconUrl: 'cafe.png'}),
    		groceryIcon = new sitkaIcon({iconUrl: 'grocery.png'}),
    		homeIcon = new sitkaIcon({iconUrl: 'home.png'}),
    		marketIcon = new sitkaIcon({iconUrl: 'market.png'}),
    		museumIcon = new sitkaIcon({iconUrl: 'museum.png'}),
    		owlIcon = new sitkaIcon({iconUrl: 'owl.png'}),
    		playgroundIcon = new sitkaIcon({iconUrl: 'playground.png'}),
    		restaurantIcon = new sitkaIcon({iconUrl: 'restaurant.png'});
    	
    	L.marker([57.05, -135.3362], {icon: homeIcon}).addTo(map)
    		.bindPopup("Your place!").openPopup();
    	
    	var playgrounds = new L.geoJson(playgrounds, {
			icon: playgroundIcon} 
			onEachFeature: function (feature, layer) {
			layer.bindPopup(feature.properties.desc);
			}
			});
		
		var walks = new L.geoJson(walks, {
			style: function(feature) {
        		switch (feature.properties.name) {
            		case 'totem':	return {color: "#00ff00"};
        			case 'bridge': return {color: "#ff0000"};
        			case 'sea walk':	return {color: "#7F00FF"};
					}
    			},
	 			onEachFeature: function (feature, layer) {
        		layer.bindPopup(feature.properties.desc);
				}
		});
		
		var points = new L.geoJson(walks, {
			style: function(feature) {
				switch (feature.properties.type) {
            		case 'house':	return {icon: homeIcon};
        			case 'learn': return {icon: scienceIcon};
        			case 'museum':	return {icon: museumIcon};
        			case 'owl': return {icon: owlIcon};
            		case 'park': return {icon: parkIcon};
					}
    			},
	 		onEachFeature: function (feature, layer) {
        	layer.bindPopup([feature.properties.name] + " - " + [feature.properties.desc]);
			}
		}),
			stores = new L.geoJson(stores, {
			style: function(feature) {
				switch (feature.properties.type) {
					case 'market': return {icon: marketIcon};
					case 'grocery': return {icon: groceryIcon};
					}
				},
			onEachFeature: function (feature, layer) {
			layer.bindPopup([feature.properties.name] + " - " + [feature.properties.desc]);
			}
		}),
			food = new L.geoJson(food, {
			style: function(feature) {
				switch (feature.properties.type) {
					case 'cafe': return {icon: cafeIcon};
					case 'restaurant': return {icon: restaurantIcon};
					}
				},
			onEachFeature: function (feature, layer) {
			layer.bindPopup([feature.properties.name] + " - " + [feature.properties.desc]);
			}
		}),
		
</script>
</body>
</html>
