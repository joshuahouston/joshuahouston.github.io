<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>Islands of Sitka</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
<script src='https://api.tiles.mapbox.com/mapbox.js/v2.1.5/mapbox.js'></script>
<link href='https://api.tiles.mapbox.com/mapbox.js/v2.1.5/mapbox.css' rel='stylesheet' />
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>
<body>
<div id='map'></div>
<script>
L.mapbox.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var map = L.mapbox.map('map', 'jfactory.islands', {
    	maxZoom: 17,
        minZoom: 15,
        maxBounds: [[57.02,-135.358],[57.048,-135.308]]
}).setView([57.033, -135.33], 16);

L.marker([57.0354, -135.32185]).addTo(map)
.bindPopup("Gucker Island?")
.openPopup();

L.marker([57.0362, -135.32377]).addTo(map)
.bindPopup("There's an island here, it just doesn't show very clearly on this. Does it have a name?");

L.marker([57.0363, -135.3203]).addTo(map)
.bindPopup("Name?");
</script>
</body>
</html>
