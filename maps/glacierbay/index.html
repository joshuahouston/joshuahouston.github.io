<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>Sitka To Glacier Bay</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
<script src="http://code.jquery.com/jquery-2.1.0.min.js"></script>
<script src='https://api.tiles.mapbox.com/mapbox.js/v1.6.4/mapbox.js'></script>
<link href='https://api.tiles.mapbox.com/mapbox.js/v1.6.4/mapbox.css' rel='stylesheet' />
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>
<body>
<div id='map'></div>
<script>
/* L.mapbox.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';

mapboxgl.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var map = new mapboxgl.Map({
  container: 'map', // container id
  style: 'https://www.mapbox.com/mapbox-gl-styles/styles/outdoors-v7.json', //stylesheet location
  center: [57.12, -135.35], // starting position
  zoom: 11 // starting zoom
});

$.getJSON('campsites.json', function(data) {
    var markers = L.geoJson(data, {
		pointToLayer: function(feature, latlng) {
			return L.marker(latlng, {icon: L.mapbox.marker.icon({
    'marker-size': 'medium',
    'marker-color': '#BE9A6B',
    'marker-symbol': 'campsite'
  })})
		},
      onEachFeature: function (feature, layer) {
		  layer.bindPopup(feature.properties.name);
      }
    });
    markers.addTo(map);
  });

  $.getJSON('markers.json', function(data) {

      'marker-color': '#2f4f4f',

        onEachFeature: function (feature, layer) {

  		  });
        }
      });
      geojson.addTo(map);
    });
  */
  $.getJSON('path.json', function(data) {
    var path = L.geoJson(data);
  path.addTo(map);
  });
</script>
</body>
</html>
