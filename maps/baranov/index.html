<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>Baranof Island Geojson</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
<script src='https://api.mapbox.com/mapbox.js/v2.2.3/mapbox.js'></script>
<link href='https://api.mapbox.com/mapbox.js/v2.2.3/mapbox.css' rel='stylesheet' />
	<script src="http://code.jquery.com/jquery-2.1.0.min.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>
<body>
<div id="map"></div>
<script>
L.mapbox.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var map = L.mapbox.map('map', 'mapbox.light')
    .setView([56.8692, -135.5136], 9);

	$.getJSON('baranof.geojson', function(data) {
	    var geojson = L.geoJson(data, {
			onEachFeature: function (feature, layer) {
			  layer.bindPopup('\<h3\>' + feature.properties.name + '\</h3\>\<p\>Area: ' + feature.properties.area + ' Square Miles\</p\>');
	      }
	    });
	    geojson.addTo(map);
	  });
</script>
</body>
</html>
