<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <title>Baranof Island Geojson</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v0.12.0/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v0.12.0/mapbox-gl.css' rel='stylesheet' />
	<script src="http://code.jquery.com/jquery-2.1.0.min.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>
<body>
<div id="map"></div>
<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var map = new mapboxgl.Map({
    container: 'map', // container id
    style: 'mapbox://styles/mapbox/light-v8', //stylesheet location
    center: [-135.732, 57.15], // starting position
    zoom: 10 // starting zoom
});

	$.getJSON('baranof.geojson', function(data) {
	    var geojson = L.geoJson(data, {
			onEachFeature: function (feature, layer) {
			  layer.bindPopup('\<h3\>' + feature.properties.name + '\</h3\>\<p\>Area:' + feature.properties.area + ' Square Miles\</p\>');
	      }
	    });
	    geojson.addTo(map);
	  });
</script>
</body>
</html>
