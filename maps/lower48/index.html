<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>Hawaii and Lower 48 Overlays</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
<script src='https://api.tiles.mapbox.com/mapbox.js/v2.1.4/mapbox.js'></script>
<link href='https://api.tiles.mapbox.com/mapbox.js/v2.1.4/mapbox.css' rel='stylesheet' />
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>
<body>
<div id='map'></div>
<div id='map-overlay-hawaii'></div>
<div id='map-overlay-lower'></div>

<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
  #map-overlay-hawaii {
      position:absolute;
      left:10px;
      bottom:10px;
      width:200px;
      height:150px;
      border:1px solid #fff;
  }
  #map-overlay-lower {
      position:absolute;
      left:10px;
      bottom:175px;
      width:200px;
      height:150px;
      border:1px solid #fff;
  }
</style>
<script>
L.mapbox.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var mapid = 'examples.map-i86nkdio';
var overlayOptions = {
    zoomControl: false,
    attributionControl: false
};

var map = L.mapbox.map('map', mapid)
    .fitBounds([[52.2702815704774,-170.15625],[71.35622888185527,-130.61718749999999]]);
    
var mapOverlayHawaii = L.mapbox.map('map-overlay-hawaii', mapid, overlayOptions)
    .fitBounds([[18.542116654448996,-161.03759765625],[22.573438264572406,-154.22607421875]]);

var mapOverlayLower = L.mapbox.map('map-overlay-lower', 'examples.map-i86nkdio', overlayOptions)
    .fitBounds([[22.917922936146045,-127.265625],[50.28933925329178,-64.3359375]]);

</script>
</body>
</html>
