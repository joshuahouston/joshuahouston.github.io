<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>The Marauder's Map</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
<script src="http://code.jquery.com/jquery-2.1.0.min.js"></script>
<script src='https://api.tiles.mapbox.com/mapbox.js/v2.1.5/mapbox.js'></script>
<script src="http://jfact0ry.com/maps/harrypotter/paths.js"></script>
<link href='https://api.tiles.mapbox.com/mapbox.js/v2.1.5/mapbox.css' rel='stylesheet' />
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>
<body>
	
<div id='map'></div>
<script>
L.mapbox.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var map = L.mapbox.map('map', 'jfactory.714fd5c2', {
	infoControl: false,
	attributionControl: true
})
	.setView([57.0496, -135.3286], 15);

map.attributionControl
	.addAttribution('Moony, Wormtail, Padfoot, and Prongs');
	
	$.getJSON('hp.json', function(data) {
	    var geojson = L.geoJson(data, {
			pointToLayer: function(feature, latlng) {
				return L.marker(latlng, {icon: myIcon})
			},
	      onEachFeature: function (feature, layer) {
			  layer.bindPopup('\<h6\>' + feature.properties.name + '\</h6\>\<p\>' + feature.properties.desc + '\</p\>');
	      }
	    });
	    geojson.addTo(map);
	  });
	  
	var barty = L.icon({
		iconUrl: 'barty.png',
		iconSize: [90, 90],
		iconAnchor: [45, 45]
	});
	
	var connie = L.icon({
		iconUrl: 'connie.png',
		iconSize: [100, 100],
		iconAnchor: [50, 50]
	});
	
	var jazz = L.icon({
		iconUrl: 'jazz.png',
		iconSize: [96, 44],
		iconAnchor: [48, 27]
	});
	
	var ellen = L.icon({
		iconUrl: 'ellen.png',
		iconSize: [136, 44],
		iconAnchor: [69, 25]
	});
	
	var joshua = L.icon({
		iconUrl: 'joshua.png',
		iconSize: [120, 60],
		iconAnchor: [57, 33]
	});
	
	var hagrid = L.icon({
			iconUrl: 'hagrid.png',
			iconSize: [88, 40],
			iconAnchor: [41, 33]
		});
	
	var fudge = L.icon({
			iconUrl: 'fudge.png',
			iconSize: [180, 56],
			iconAnchor: [87, 28]
		});
	
	var myIcon = L.icon({
		iconUrl: 'bolt.png',
		iconRetinaUrl: 'boltx2.png',
		iconSize: [18, 46],
		iconAnchor: [5, 44],
		popupAnchor: [0, -40],
		shadowUrl: 'shadow.png',
		shadowRetinaUrl: 'shadowx2.png',
		shadowSize: [27, 16],
		shadowAnchor: [13, 6]
	});
	
	// 1st path
	// geojsonOne, start, momentum, j, markerOne, tick
	var geojsonOne = { type: 'LineString', coordinates: seakayak };
	var start = [1, 1];
	var momentum = [1, 1];

	for (var i = 0; i < 300; i++) {
	    start[0] += momentum[0];
	    start[1] += momentum[1];
	    if (start[1] > 60 || start[1] < -60) momentum[1] *= -1;
	    if (start[0] > 170 || start[0] < -170) momentum[0] *= -1;
	    geojsonOne.coordinates.push(start.slice());
	}

	// Add this generated invisible geojson object to the map.
	L.geoJson(geojsonOne, {
		//invisible? or no
	    opacity: 0
	}).addTo(map);

	// Create a counter with a value of 0.
	var j = 0;

	// Create a marker and add it to the map.
	var markerOne = L.marker([0,0], {
	  icon: ellen 
	}).addTo(map);

	tick();
	function tick() {
	    // Set the marker to be at the same point as one
	    // of the segments or the line.
	    markerOne.setLatLng(L.latLng(
	        geojsonOne.coordinates[j][1],
	        geojsonOne.coordinates[j][0]));

	    // Move to the next point of the line
	    // until `j` reaches the length of the array.
	    if (++j < geojsonOne.coordinates.length) setTimeout(tick, 1000);
	};

	// 2nd path
	// debut, elan, r, markerTwo, tock
	var geojsonTwo = { type: 'LineString', coordinates: forest };
	var debut = [1, 1];
	var elan = [1, 1];

	for (var i = 0; i < 300; i++) {
	    debut[0] += elan[0];
	    debut[1] += elan[1];
	    if (debut[1] > 60 || debut[1] < -60) elan[1] *= -1;
	    if (debut[0] > 170 || debut[0] < -170) elan[0] *= -1;
	    geojsonTwo.coordinates.push(debut.slice());
	}

	// Add this generated invisible geojson object to the map.
	L.geoJson(geojsonTwo, {
		opacity: 0
	}).addTo(map);

	// Create a counter with a value of 0.
	var r = 0;

	// Create a marker and add it to the map.
	var markerTwo = L.marker([0,0], {
	 icon: hagrid
	}).addTo(map);

	tock();
	function tock() {
	    // Set the marker to be at the same point as one
	    // of the segments or the line.
	    markerTwo.setLatLng(L.latLng(
	        geojsonTwo.coordinates[r][1],
	        geojsonTwo.coordinates[r][0]));

	    // Move to the next point of the line
	    // until `j` reaches the length of the array.
	    if (++r < geojsonTwo.coordinates.length) setTimeout(tock, 800);
	};
	
	// 3rd path
	// geojsonThree, anfang, schwung, k, markerThree, tack
	var geojsonThree = { type: 'LineString', coordinates: yoga };
	var anfang = [1, 1];
	var schwung = [1, 1];

	for (var i = 0; i < 300; i++) {
	    anfang[0] += schwung[0];
	    anfang[1] += schwung[1];
	    if (anfang[1] > 60 || anfang[1] < -60) schwung[1] *= -1;
	    if (anfang[0] > 170 || anfang[0] < -170) schwung[0] *= -1;
	    geojsonThree.coordinates.push(anfang.slice());
	}

	// Add this generated invisible geojson object to the map.
	L.geoJson(geojsonThree, {
		opacity: 0
	}).addTo(map);

	// Create a counter with a value of 0.
	var k = 0;
              
	// Create a marker and add it to the map.
	var markerThree = L.marker([0,0], {           
	 icon: jazz
	}).addTo(map);

	tack();
	function tack() {
	    // Set the marker to be at the same point as one
	    // of the segments or the line.
	    markerThree.setLatLng(L.latLng(
	        geojsonThree.coordinates[k][1],
	        geojsonThree.coordinates[k][0]));

	    // Move to the next point of the line
	    // until `j` reaches the length of the array.
	    if (++k < geojsonThree.coordinates.length) setTimeout(tack, 600);
	};
	// 4th path
	// geojsonFour, inizio, impulso, s, markerFour, teck
	var geojsonFour = { type: 'LineString', coordinates: owlery  };
	var inizio = [1, 1];
	var impulso = [1, 1];

	for (var i = 0; i < 300; i++) {
	    inizio[0] += impulso[0];
	    inizio[1] += impulso[1];
	    if (inizio[1] > 60 || inizio[1] < -60) impulso[1] *= -1;
	    if (inizio[0] > 170 || inizio[0] < -170) impulso[0] *= -1;
	    geojsonFour.coordinates.push(inizio.slice());
	}

	// Add this generated invisible geojson object to the map.
	L.geoJson(geojsonFour, {
		opacity: 0
	}).addTo(map);

	// Create a counter with a value of 0.
	var s = 0;

	// Create a marker and add it to the map.
	var markerFour = L.marker([0,0], {           
	 icon: joshua
	}).addTo(map);

	teck();
	function teck() {
	    // Set the marker to be at the same point as one
	    // of the segments or the line.
	    markerFour.setLatLng(L.latLng(
	        geojsonFour.coordinates[s][1],
	        geojsonFour.coordinates[s][0]));

	    // Move to the next point of the line
	    // until `j` reaches the length of the array.
	    if (++s < geojsonFour.coordinates.length) setTimeout(teck, 600);
	};

</script>
</body>
</html>
