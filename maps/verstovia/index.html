<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8' />
    <title>Sitka Mt. Verstovia Map</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v0.20.1/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v0.20.1/mapbox-gl.css' rel='stylesheet' />
	<style>
        body { margin:0; padding:0; }
        #map { position:absolute; top:0; bottom:0; width:100%; }
    </style>
</head>
<body>
<div id='map'></div>
<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var bounds = [
  [-135.3368, 57.032], // sw
  [-135.1984, 57.08] // ne
];

var map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/jfactory/citg6xotx00082ipgbzflytod',
  center: [-135.2877, 57.0529],
  maxBounds: bounds,
  minZoom: 10,
  maxZoom: 19,
  zoom: 14,
  hash: true
});

map.addControl(new mapboxgl.Navigation({
  position: 'top-left'
}));

map.addControl(new mapboxgl.Geolocate({position: 'top-left'})); // position is optional

map.on('click', function (e) {
    document.getElementById('info').innerHTML =
        // e.point is the x, y coordinates of the mousemove event relative
        // to the top-left corner of the map
       // JSON.stringify(e.point) + '<br />' +
            // e.lngLat is the longitude, latitude geographical position of the event
        JSON.stringify(e.lngLat);
});
</script>
</body>
</html>
