<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>Verstovia Ghost Race</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
<script src="http://code.jquery.com/jquery-2.1.0.min.js"></script>
<script src='https://api.tiles.mapbox.com/mapbox.js/v2.1.5/mapbox.js'></script>
<link href='https://api.tiles.mapbox.com/mapbox.js/v2.1.5/mapbox.css' rel='stylesheet' />
<script src="verstovia.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
}
</style>
</head>
<body>
<div id='map'></div>
<script>
L.mapbox.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var map = L.mapbox.map('map', 'jfactory.l0diaa22').setView([57.054, -135.288], 15);

// Generate a GeoJSON line. You could also load GeoJSON via AJAX
// or generate it some other way.
var red = '#f86767'
var blue = '#1087BF'
var yellow = '#ffff33'
var path = function (place,color) {
var geojson = { type: 'LineString', coordinates: place };
var start = [-135.279400, 57.056217];
var momentum = [0, 0];

for (var i = 0; i < 300; i++) {
    start[0] += momentum[0];
    start[1] += momentum[1];
    if (start[1] > 0 || start[1] < -0) momentum[1] *= -1;
    if (start[0] > 0 || start[0] < -0) momentum[0] *= -1;
    geojson.coordinates.push(start.slice());
}

// Add this generated geojson object to the map.
    L.geoJson(geojson, {
        opacity: 0
    }).addTo(map);

// Create a counter with a value of 0.
var j = 0;

// Create a marker and add it to the map.
var marker = L.marker([0, 0], {
  icon: L.mapbox.marker.icon({
    'marker-color': color
  })
}).addTo(map);

tick();
function tick() {
    // Set the marker to be at the same point as one
    // of the segments or the line.
    marker.setLatLng(L.latLng(
        geojson.coordinates[j][1],
        geojson.coordinates[j][0]));

    // Move to the next point of the line
    // until `j` reaches the length of the array.
    if (++j < geojson.coordinates.length) setTimeout(tick, 35);
}
};

path(jjh,red);
path(jar,blue);
path(jaj,yellow);
</script>
</body>
</html>
