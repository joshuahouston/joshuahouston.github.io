<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <title>Terrain Map from LiDAR</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v0.15.0/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v0.15.0/mapbox-gl.css' rel='stylesheet' />
    <style>
        body { margin:0; padding:0; }
        #map { position:absolute; top:0; bottom:0; width:100%; }
    </style>
</head>
<body>

<div id='map'></div>
<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var map = new mapboxgl.Map({
    container: 'map', // container id
    style: 'mapbox://styles/jfactory/cimdrkj2q00hs9pm0jjtr1ddn', //hosted style id
    center: [-135.33, 57.06], // starting position
    zoom: 13 // starting zoom
});
</script>

</body>
</html>
