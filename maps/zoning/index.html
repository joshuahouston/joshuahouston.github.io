<!DOCTYPE html>
<html>
<head>
<title>Sitka Zoning Test</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<script src="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.js"></script>
<link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.css" />
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
}
</style>
</head>
<body>
<div id="map"></div>
<script>
var mbUrl = 'https://{s}.tiles.mapbox.com/v3/{id}/{z}/{x}/{y}.png';

	    var night   = L.tileLayer(mbUrl, {id: 'examples.map-y7l23tes'}),
		    zoning  = L.tileLayer(mbUrl, {id: 'jfactory.nz4wvcxr'}),
			streets  = L.tileLayer(mbUrl, {id: 'examples.map-i875mjb7'}),
			classic = L.tileLayer(mbUrl, {id: 'examples.map-i86nkdio'}),
			grayscale = L.tileLayer(mbUrl, {id: 'examples.map-20v6611k'}),
			anotherstreets = L.tileLayer(mbUrl, {id: 'examples.map-i87786ca'});

		var map = L.map('map', {
			center: [57.049, -135.332],
			zoom: 15,
			layers: [night, zoning],
			detectRetina: true
		});
		var baseLayers = {
			"Grayscale": grayscale,
			"Streets": streets,
			"Night": night 	
		};
		var overlays = {
			"Zoning": zoning
		};
		
		L.control.layers(baseLayers, overlays).addTo(map);
</script>
</body>
</html>
