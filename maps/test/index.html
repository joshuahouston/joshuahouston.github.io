<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>The Marauder's Map</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
<script src="http://code.jquery.com/jquery-2.1.0.min.js"></script>
<script src='https://api.tiles.mapbox.com/mapbox.js/v2.1.5/mapbox.js'></script>
<link href='https://api.tiles.mapbox.com/mapbox.js/v2.1.5/mapbox.css' rel='stylesheet' />
</head>
<body>
	
<div id='map'></div>
<script>
L.mapbox.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var map = L.mapbox.map('map', 'jfactory.714fd5c2')
	.setView([57.0496, -135.3286], 15);
	
	$.getJSON('hp.json', function(data) {
	    var geojson = L.geoJson(data, {
			pointToLayer: function(feature, latlng) {
				return L.marker(latlng, {icon: myIcon})
			},
	      onEachFeature: function (feature, layer) {
			  layer.bindPopup('\<h6\>' + feature.properties.name + '\</h6\>\<p\>' + feature.properties.desc + '\</p\>');
	      }
	    });
	    geojson.addTo(map);
	  });
	  
	var barty = L.icon({
		iconUrl: 'barty.png',
		iconSize: [90, 90],
		iconAnchor: [45, 45]
	});
	
	var connie = L.icon({
		iconUrl: 'connie.png',
		iconSize: [100, 100],
		iconAnchor: [50, 50]
	});
	
	var myIcon = L.icon({
		iconUrl: 'bolt.png',
		iconRetinaUrl: 'boltx2.png',
		iconSize: [18, 46],
		iconAnchor: [5, 44],
		popupAnchor: [0, -40],
		shadowUrl: 'shadow.png',
		shadowRetinaUrl: 'shadowx2.png',
		shadowSize: [27, 16],
		shadowAnchor: [13, 6]
	});
</script>
</body>
</html>
