<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>Crossing The Island</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
<script src="http://code.jquery.com/jquery-2.1.0.min.js"></script>
<script src="shapes.js"></script>
<script src='https://api.tiles.mapbox.com/mapbox.js/v2.1.5/mapbox.js'></script>
<link href='https://api.tiles.mapbox.com/mapbox.js/v2.1.5/mapbox.css' rel='stylesheet' />
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>
<body>
<div id='map'></div>
<script>
L.mapbox.accessToken = 'pk.eyJ1IjoiamZhY3RvcnkiLCJhIjoiZXdJam1yZyJ9.-AOTWD0gk1_3wuciI3DbsQ';
var map = L.mapbox.map('map', 'jfactory.l0diaa22').setView([57.049, -135.328], 13);
var red = '#ce2d18'
var blue = '#2d5ed1'
var green = '#9fdf81'
var path = function (route,color) {
var geojson = { type: 'LineString', coordinates: route };
var start = [-135.332398, 57.050407];
var momentum = [0, 0];

for (var i = 0; i < 300; i++) {
    start[0] += momentum[0];
    start[1] += momentum[1];
    if (start[1] > 0 || start[1] < 0) momentum[1] *= -1;
    if (start[0] > 0 || start[0] < 0) momentum[0] *= -1;
    geojson.coordinates.push(start.slice());
}

// Add this generated geojson object to the map.
L.geoJson(geojson, {
    color: color,
    opacity: 0.5
}).addTo(map);

// Create a counter with a value of 0.
var j = 0;

// Create a marker and add it to the map.
var marker = L.marker([0, 0], {
  icon: L.mapbox.marker.icon({
    'marker-color': '#444444',
	'marker-size': 'small',
	  'marker-symbol': 'bus'
  })
}).addTo(map);

tick();
function tick() {
    // Set the marker to be at the same point as one
    // of the segments or the line.
    marker.setLatLng(L.latLng(
        geojson.coordinates[j][1],
        geojson.coordinates[j][0]));

    // Move to the next point of the line
    // until `j` reaches the length of the array.
    if (++j < geojson.coordinates.length) setTimeout(tick, 300);
}
};
path(redline, red);
path(greenline, green);
path(blueline, blue);
</script>
</body>
</html>
