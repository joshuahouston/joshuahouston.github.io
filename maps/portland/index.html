<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>Portland Visit</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
	<link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.css" />
	 <script src="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>
<body>
<div id="map"></div>
		<script>
var layer = L.tileLayer('http://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{
  attribution: '© OpenStreetMap contributors, © CartoDB'
});

var map = L.map('map', {
    scrollWheelZoom: false,
    center: [45.507, -122.622],
    zoom: 14
});

map.addLayer(layer);

L.marker([45.5081, -122.61148]).addTo(map)
.bindPopup("Yoga Union 2043 SE 50th Ave");		
    		
L.marker([45.5069, -122.62216]).addTo(map)
.bindPopup("Michael & Abby's 3919 SE Grant Ct").openPopup();

L.marker([45.512, -122.6266]).addTo(map)
.bindPopup("Chocolate Waffle");

L.marker([45.51214, -122.61278]).addTo(map)
.bindPopup("Apizza Scholls");

L.marker([45.504952, -122.630631]).addTo(map)
.bindPopup("Salt & Straw");

L.marker([45.512237, -122.628716]).addTo(map)
.bindPopup("Blue Star Donuts");

L.marker([45.512205, -122.62534]).addTo(map)
.bindPopup("Powell's Books on Hawthorne");

L.marker([45.50471, -122.64375]).addTo(map)
.bindPopup("Barre 3");

L.marker([45.50449, -122.65328]).addTo(map)
.bindPopup("Peace Shakti Yoga - may not exist");

L.marker([45.50513, -122.65326]).addTo(map)
.bindPopup("Peace Shakti Yoga 2 - may not exist")

L.marker([45.5177, -122.65112]).addTo(map)
.bindPopup("Shakti House");

L.marker([45.51186, -122.6207]).addTo(map)
.bindPopup("New Seasons");

L.marker([45.50374, -122.63946]).addTo(map)
.bindPopup("Off The Waffle");

L.marker([45.51194, -122.62622]).addTo(map)
.bindPopup("Juice: Harlow");

L.marker([45.51804, -122.65554]).addTo(map)
.bindPopup("Food truck");

L.marker([45.52928, -122.65793]).addTo(map)
.bindPopup("Lloyd Farmers Market - Tues 10 - 2");
						</script>
</body>
</html>
