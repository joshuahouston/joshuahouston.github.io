<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>Portland Visit</title>
<meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
	<link rel="stylesheet" href="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.css" />
	 <script src="http://cdn.leafletjs.com/leaflet-0.7.3/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
</style>
</head>
<body>
<div id="map"></div>
		<script>
var layer = L.tileLayer('http://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{
  attribution: '© OpenStreetMap contributors, © CartoDB'
});

var map = L.map('map', {
    scrollWheelZoom: false,
    center: [45.507, -122.622],
    zoom: 14
});

map.addLayer(layer);

		
var myIcon = L.Icon.extend({
	options: {
		shadowUrl: 'shadow.png',
		iconSize:     [44, 44],
		shadowSize:   [30, 30],
		iconAnchor:   [21, 45],
		shadowAnchor: [4, 30],
		popupAnchor:  [2, -42]
	}
});

var blueIcon = new myIcon({iconUrl: 'blue.png'}),
	redIcon = new myIcon({iconUrl: 'red.png'}),
	greenIcon = new myIcon({iconUrl: 'green.png'}),
	orangeIcon = new myIcon({iconUrl: 'orange.png'}),
	yellowIcon = new myIcon({iconUrl: 'yellow.png'}),
	grayIcon = new myIcon({iconUrl: 'gray.png'});

L.marker([45.512, -122.6266], {icon: orangeIcon}).addTo(map)
.bindPopup("Chocolate Waffle");

L.marker([45.51214, -122.61278], {icon: orangeIcon}).addTo(map)
.bindPopup("Apizza Scholls");

L.marker([45.504952, -122.630631], {icon: blueIcon}).addTo(map)
.bindPopup("Salt & Straw");

L.marker([45.512237, -122.628716], {icon: blueIcon}).addTo(map)
.bindPopup("Blue Star Donuts");

L.marker([45.512205, -122.62534], {icon: grayIcon}).addTo(map)
.bindPopup("Powell's Books on Hawthorne");

L.marker([45.51186, -122.6207], {icon: grayIcon}).addTo(map)
.bindPopup("New Seasons");

L.marker([45.51194, -122.62622], {icon: greenIcon}).addTo(map)
.bindPopup("Juice: Harlow");

L.marker([45.52232, -122.65941], {icon: orangeIcon}).addTo(map)
.bindPopup("Nong's Khao Man Gai");

L.marker([45.51924, -122.63695], {icon: greenIcon}).addTo(map)
.bindPopup("Canteen");

L.marker([45.50469, -122.63942], {icon: redIcon}).addTo(map)
.bindPopup("The Bhaktishop - We signed up for a 2 week course");

L.marker([45.50789, -122.60725], {icon: yellowIcon}).addTo(map)
.bindPopup("Kayak museum");

L.marker([45.50464, -122.62393], {icon: orangeIcon}).addTo(map)
.bindPopup("Little Big Burger & Truffle Fries");

/* L.marker([], {}).addTo(map)
.bindPopup("")*/

var popup = L.popup();

function onMapClick(e) {
    popup
        .setLatLng(e.latlng)
        .setContent(e.latlng.toString())
        .openOn(map);
}

map.on('click', onMapClick);

		map.locate({setView: true, maxZoom: 16});
			
			function onLocationFound(e) {
 				  var radius = e.accuracy / 2;

	    L.circle(e.latlng, radius).addTo(map);
			}

		map.on('locationfound', onLocationFound);
						</script>
</body>
</html>
